<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexMarket | Track Delivery</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Leaflet CSS for Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            /* Prevent scrolling, full map experience */
        }

        .delivery-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .map-wrapper {
            flex: 1;
            position: relative;
        }

        #deliveryMap {
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Overlay UI on top of map */
        .delivery-info-overlay {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.5rem;
            width: 90%;
            max-width: 500px;
            z-index: 1000;
            /* Ensure it's above Leaflet */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .driver-profile {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .driver-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--accent-customer);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            border: 2px solid white;
        }

        .driver-details h3 {
            margin: 0 0 0.2rem 0;
            color: white;
            font-size: 1.1rem;
        }

        .driver-details p {
            margin: 0;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .eta-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--glass-border);
            padding-top: 1rem;
        }

        .eta-time {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent-both);
        }

        .home-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid var(--glass-border);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        /* Order Summary Styles */
        .order-summary-toggle {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0 0 0;
            margin-top: 1rem;
            border-top: 1px solid var(--glass-border);
            cursor: pointer;
            color: white;
            font-weight: 600;
        }

        .order-summary-content {
            display: none;
            margin-top: 1rem;
            max-height: 150px;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.2);
            padding: 0.5rem;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .summary-item:last-child {
            border-bottom: none;
        }

        .summary-item-name {
            color: white;
            font-size: 0.9rem;
            flex: 1;
        }

        .summary-item-qty {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-left: 1rem;
        }

        .summary-item-price {
            color: var(--accent-both);
            font-weight: bold;
            font-size: 0.9rem;
            margin-left: 1rem;
        }

        /* Custom Scrollbar for Summary */
        .order-summary-content::-webkit-scrollbar {
            width: 5px;
        }

        .order-summary-content::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 5px;
        }
    </style>
</head>

<body>
    <div class="delivery-container">
        <!-- Back Button -->
        <a href="customer.html" class="home-btn">← Back to Dashboard</a>

        <!-- Map Area -->
        <div class="map-wrapper">
            <div id="deliveryMap"></div>

            <!-- Bottom Info Card -->
            <div class="delivery-info-overlay">
                <div class="driver-profile">
                    <div class="driver-avatar">🏍️</div>
                    <div class="driver-details">
                        <h3 id="driverName">Assigning Delivery Partner...</h3>
                        <p id="driverStatus">Looking for nearby drivers</p>
                    </div>
                    <div style="flex: 1; text-align: right;">
                        <button class="btn btn-customer" style="padding: 0.5rem 1rem; font-size: 0.9rem;" id="callBtn"
                            disabled>Call</button>
                    </div>
                </div>

                <div class="eta-container">
                    <div>
                        <div style="color: var(--text-secondary); font-size: 0.85rem; text-transform: uppercase;">
                            Estimated Arrival</div>
                        <div class="eta-time" id="etaDisplay">--:--</div>
                    </div>
                    <div>
                        <div style="color: var(--text-secondary); font-size: 0.85rem; text-transform: uppercase;">Order
                            ID</div>
                        <div style="color: white; font-weight: bold;" id="orderIdDisplay">#----</div>
                    </div>
                </div>

                <!-- Progress Bar -->
                <div
                    style="width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-top: 1.2rem; overflow: hidden;">
                    <div id="deliveryProgress"
                        style="width: 5%; height: 100%; background: var(--accent-both); transition: width 1s linear;">
                    </div>
                </div>

                <!-- Order Summary Toggle -->
                <div class="order-summary-toggle" id="summaryToggleBtn">
                    <span>📋 View Order Summary</span>
                    <span id="summaryArrow" style="transition: transform 0.3s; font-size: 0.8rem;">▼</span>
                </div>

                <div class="order-summary-content" id="orderSummaryContent">
                    <!-- Items appended here by JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="delivery.js"></script>
</body>

</html>
