<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexMarket | Mostly Shopped</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        .mostly-shopped-container {
            max-width: 900px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }

        .store-stat-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 2rem;
            text-align: center;
            transition: transform 0.2s, border-color 0.2s;
        }

        .store-stat-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-customer);
        }

        .store-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .store-name {
            font-size: 1.25rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
            color: white;
        }

        .store-stats {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }

        .store-stats strong {
            color: var(--accent-both);
        }

        .empty-history {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px dashed var(--glass-border);
            border-radius: 16px;
            color: var(--text-secondary);
        }
    </style>
</head>

<body>
    <nav class="navbar dashboard-nav">
        <div class="logo">NexMarket <span class="badge customer-badge">Insights</span></div>
        <div class="nav-links" style="display: flex; align-items: center;">
            <a href="javascript:history.back()"
                style="font-weight: 600; text-decoration: none; color: var(--text-primary);">← Back</a>
        </div>
    </nav>

    <main class="dashboard-container" style="padding-top: 6rem;">
        <h2 class="section-title" style="text-align: center; margin-bottom: 2rem;">Your Favorite Stores</h2>
        <p style="text-align: center; color: var(--text-secondary); margin-top: -1.5rem; margin-bottom: 2.5rem;">Mostly
            shopped stores based on your order history.</p>

        <div class="mostly-shopped-container" id="mostlyShoppedContainer">
            <!-- Stores populated natively -->
        </div>
    </main>

    <script src="mostly-shopped.js"></script>
</body>

</html>
