<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexMarket | My Wishlist</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        .wishlist-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
        }

        .wishlist-header {
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .wishlist-title {
            font-size: 2rem;
            margin: 0;
            color: white;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .wishlist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .wishlist-item-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .wishlist-item-img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-bottom: 1px solid var(--glass-border);
        }

        .wishlist-item-info {
            padding: 1rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .wishlist-item-name {
            font-size: 1.1rem;
            color: white;
            margin: 0 0 0.5rem 0;
            font-weight: 600;
        }

        .wishlist-store-name {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .wishlist-item-price {
            font-size: 1.2rem;
            color: var(--accent-customer);
            font-weight: bold;
            margin-bottom: 1rem;
        }

        .remove-wishlist-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            z-index: 10;
        }
    </style>
</head>

<body>
    <nav class="navbar dashboard-nav">
        <div class="logo">NexMarket <span class="badge customer-badge">Customer Mode</span></div>
        <div class="nav-links" style="display: flex; align-items: center;">
            <a href="customer.html" style="font-weight: 600; text-decoration: none; color: var(--text-primary);">← Back
                to Store</a>
        </div>
    </nav>

    <main class="dashboard-container" style="padding-top: 6rem;">
        <div class="wishlist-container">
            <div class="wishlist-header">
                <h1 class="wishlist-title">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="#10b981" stroke="#10b981" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z">
                        </path>
                    </svg>
                    My Wishlist
                </h1>
            </div>

            <div class="wishlist-grid" id="wishlistGrid">
                <!-- Items populated here via JS -->
            </div>

            <div id="emptyWishlistState" style="display: none; text-align: center; padding: 4rem 2rem;">
                <div style="font-size: 4rem; margin-bottom: 1rem;">♡</div>
                <h3 style="color: white; margin-bottom: 0.5rem;">Your wishlist is empty</h3>
                <p style="color: var(--text-secondary); margin-bottom: 2rem;">Start exploring stores and save items you
                    love!</p>
                <a href="customer.html" class="btn btn-customer">Explore Stores</a>
            </div>
        </div>
    </main>

    <script src="wishlist.js"></script>
</body>

</html>
